# Docker Compose - Desarrollo local con hot reload
# Uso: docker compose up --build

version: '3.8'

services:
  web:
    image: node:20-alpine
    container_name: barberflow-dev
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    # Para Supabase local en el futuro, agregar red y servicio db
