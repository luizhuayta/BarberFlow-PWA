# Docker Compose - Producción
# Uso: docker compose -f docker-compose.prod.yml up --build -d

version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barberflow-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Configurar estas variables en .env o aquí para producción:
      # - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      # - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      # - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    restart: unless-stopped
