# Docker Compose - Producción
# Uso: docker compose -f docker-compose.prod.yml up --build -d

version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barberflow-prod
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
