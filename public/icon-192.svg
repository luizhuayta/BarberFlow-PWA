<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d03f"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <!-- Fondo oscuro elegante -->
  <rect width="192" height="192" rx="38" fill="#0f0f0f"/>
  
  <!-- Círculo principal -->
  <circle cx="96" cy="96" r="68" fill="#1a1a1a" stroke="#d4af37" stroke-width="3"/>
  
  <!-- Monograma BF elegante -->
  <text 
    x="96" 
    y="108" 
    font-family="Georgia, serif" 
    font-size="72" 
    font-weight="700" 
    fill="url(#gold)" 
    text-anchor="middle" 
    dominant-baseline="middle"
    letter-spacing="-4">BF</text>
  
  <!-- Pequeñas tijeras decorativas arriba -->
  <g transform="translate(96 42)">
    <path d="M-18 -6 L-4 8 M-18 8 L-4 -6" stroke="#d4af37" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M4 -6 L18 8 M4 8 L18 -6" stroke="#d4af37" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="0" cy="1" r="3.5" fill="#d4af37"/>
  </g>
</svg>
