<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d03f"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <!-- Fondo -->
  <rect width="512" height="512" rx="108" fill="#0f0f0f"/>
  
  <!-- Círculo principal -->
  <circle cx="256" cy="256" r="182" fill="#1a1a1a" stroke="#d4af37" stroke-width="8"/>
  
  <!-- Monograma BF grande y elegante -->
  <text 
    x="256" 
    y="282" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="188" 
    font-weight="700" 
    fill="url(#gold)" 
    text-anchor="middle" 
    dominant-baseline="middle"
    letter-spacing="-10">BF</text>
  
  <!-- Tijeras decorativas -->
  <g transform="translate(256 108)">
    <path d="M-48 -16 L-11 21 M-48 21 L-11 -16" stroke="#d4af37" stroke-width="10" stroke-linecap="round"/>
    <path d="M11 -16 L48 21 M11 21 L48 -16" stroke="#d4af37" stroke-width="10" stroke-linecap="round"/>
    <circle cx="0" cy="2.5" r="9" fill="#d4af37"/>
  </g>
</svg>
